<html>
    <head>
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="container">
            <div class="score-wrapper">
                <h3>HOME</h3>
                <p class="score" id="homeScore">0</p>
                <div class="button-wrapper">
                    <button class="scoreButton" id="incrHomeByOne">+1</button>
                    <button class="scoreButton" id="incrHomeByTwo">+2</button>
                    <button class="scoreButton" id="incrHomeByThree">+3</button>
                </div>
            </div>
            <button id="resetButton">RESET</button>
            <div class="score-wrapper">
                <h3>Away</h3>
                <p class="score" id="guestScore">0</p>
                <div class="button-wrapper">
                    <button class="scoreButton" id="incrGuestByOne">+1</button>
                    <button class="scoreButton" id="incrGuestByTwo">+2</button>
                    <button class="scoreButton" id="incrGuestByThree">
                        +3
                    </button>
                </div>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
